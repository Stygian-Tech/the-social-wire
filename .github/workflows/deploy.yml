name: Deploy

on:
  push:
    branches: [main, dev]

# Latest push wins; avoid overlapping Fly deploys from rapid commits.
concurrency:
  group: deploy-api-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-api:
    name: Deploy API (Fly.io)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@v1

      # Per-environment Fly apps (create both in the Fly org, then set repo secrets).
      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${{ github.ref_name }}" = "main" ]; then
            APP="${{ secrets.FLY_APP_PROD }}"
          else
            APP="${{ secrets.FLY_APP_DEV }}"
          fi
          if [ -z "${APP}" ]; then
            echo '::error::Missing Fly app name — set repository secrets FLY_APP_PROD and FLY_APP_DEV.'
            exit 1
          fi
          flyctl deploy ./services/api --app "${APP}" --remote-only

  # ── Web deploy (Vercel handles this via its GitHub integration) ────────────
  # Vercel auto-deploys on push to main (prod) and dev (preview).
  # Set NEXT_PUBLIC_APP_ENV=prod in Vercel production env vars.
  # Set NEXT_PUBLIC_APP_ENV=dev in Vercel preview env vars.
