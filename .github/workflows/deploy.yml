name: Deploy

on:
  push:
    branches: [main, dev]

jobs:
  build-and-deploy-api:
    name: Build API & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # Depot + GHCR publishes

    steps:
      - uses: actions/checkout@v4

      # ── Resolve image tag from branch ──────────────────────────────────────
      - name: Set image tag
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
            echo "APPRUNNER_ARN=${{ secrets.APPRUNNER_PROD_ARN }}" >> $GITHUB_ENV
            echo "APP_ENV=prod" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=dev" >> $GITHUB_ENV
            echo "APPRUNNER_ARN=${{ secrets.APPRUNNER_DEV_ARN }}" >> $GITHUB_ENV
            echo "APP_ENV=dev" >> $GITHUB_ENV
          fi

      - name: Configure GHCR image coordinates
        run: |
          OWNER_REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "GHCR_IMAGE=ghcr.io/${OWNER_REPO_LOWER}/social-wire-api" >> "$GITHUB_ENV"

      # ── Registry login (GHCR) ───────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      # ── Depot build & push ──────────────────────────────────────────────────
      - uses: depot/setup-action@v1
        with:
          oidc: true  # keyless auth via OIDC

      - name: Build and push API image
        uses: depot/build-push-action@v1
        with:
          project: ${{ secrets.DEPOT_PROJECT_ID }}
          context: services/api
          file: services/api/Dockerfile
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.GHCR_IMAGE }}:${{ github.sha }}
          build-args: |
            APP_ENV=${{ env.APP_ENV }}

      # ── Deploy to AWS App Runner ────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to App Runner
        run: |
          aws apprunner start-deployment \
            --service-arn "${{ env.APPRUNNER_ARN }}" \
            --region us-east-1

  # ── Web deploy (Vercel handles this via its GitHub integration) ────────────
  # Vercel auto-deploys on push to main (prod) and dev (preview).
  # Set NEXT_PUBLIC_APP_ENV=prod in Vercel production env vars.
  # Set NEXT_PUBLIC_APP_ENV=dev in Vercel preview env vars.
