name: Deploy

# Automatic deploy runs at the end of CI (.github/workflows/ci.yml) on push to dev/main.
on:
  workflow_dispatch:
    inputs:
      branch:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - main
      deploy_appview:
        description: Also deploy AppView
        required: true
        type: boolean
        default: true
      deploy_appview_worker:
        description: Also deploy AppView worker
        required: true
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-gateway:
    name: Deploy Gateway (Fly.io)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy gateway to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_ORG: ${{ secrets.FLY_ORG }}
          FLY_GATEWAY_APP_DEV: ${{ secrets.FLY_GATEWAY_APP_DEV }}
          FLY_GATEWAY_APP_PROD: ${{ secrets.FLY_GATEWAY_APP_PROD }}
        run: bash scripts/fly-deploy-gateway.sh "${{ inputs.branch }}"

      - name: Deploy AppView to Fly.io
        if: inputs.deploy_appview
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_ORG: ${{ secrets.FLY_ORG }}
          FLY_APPVIEW_APP_DEV: ${{ secrets.FLY_APPVIEW_APP_DEV }}
          FLY_APPVIEW_APP_PROD: ${{ secrets.FLY_APPVIEW_APP_PROD }}
        run: bash scripts/fly-deploy-appview.sh "${{ inputs.branch }}"

      - name: Deploy AppView worker to Fly.io
        if: inputs.deploy_appview_worker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_ORG: ${{ secrets.FLY_ORG }}
          FLY_APPVIEW_WORKER_APP_DEV: ${{ secrets.FLY_APPVIEW_WORKER_APP_DEV }}
          FLY_APPVIEW_WORKER_APP_PROD: ${{ secrets.FLY_APPVIEW_WORKER_APP_PROD }}
        run: bash scripts/fly-deploy-appview-worker.sh "${{ inputs.branch }}"

  # ── Web deploy (Vercel handles this via its GitHub integration) ────────────
  # Vercel auto-deploys on push to main (prod) and dev (preview).
