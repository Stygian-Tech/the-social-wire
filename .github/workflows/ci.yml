name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # Path gates — branch protection must allow skipped jobs (or use separate workflows per surface).
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'package.json'
              - 'bun.lock'
              - 'turbo.json'
              - '.github/workflows/ci.yml'
            api:
              - 'services/api/**'
              - 'packages/spec/openapi.yaml'
              - '.github/workflows/ci.yml'

  # ── Web ───────────────────────────────────────────────────────────────────
  build-web:
    name: Build & Test Web
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Typecheck
        run: bunx turbo typecheck --filter=web

      - name: Lint
        run: bunx turbo lint --filter=web

      - name: Test with coverage
        run: bunx turbo test --filter=web
        env:
          NEXT_PUBLIC_APP_ENV: test

      - name: Build
        run: bunx turbo build --filter=web
        env:
          NEXT_PUBLIC_APP_ENV: test
          NEXT_PUBLIC_ATPROTO_CLIENT_ID: test-client

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: apps/web/coverage/lcov.info
          flags: web
          token: ${{ secrets.CODECOV_TOKEN }}

  test-api:
    name: Swift API (Package)
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4

      - name: Cache Swift PM build artifacts
        uses: actions/cache@v4
        with:
          path: services/api/.build
          key: ${{ runner.os }}-swift-api-swift62-${{ hashFiles('services/api/Package.resolved') }}

      - uses: swift-actions/setup-swift@v3
        with:
          # Pin a minor line — `latest` has resolved inconsistently with Swiftly and can fail the version check / build.
          swift-version: "6.2.4"
          # Ubuntu images often lack the Swiftly release signing key in gpg; verification then fails (swift-actions/setup-swift#798).
          skip-verify-signature: true

      - name: Build
        run: swift build

      - name: Test with coverage
        run: swift test --enable-code-coverage

      - name: Export lcov from llvm-cov
        run: |
          set -euxo pipefail
          # Use the llvm-cov bundled with the active Swift toolchain (PATH may pick an older system llvm-cov on Ubuntu, which rejects Swift's profdata).
          _swift="$(command -v swift)"
          LLVM_COV="$(dirname "$(readlink -f "$_swift" 2>/dev/null || echo "$_swift")")/llvm-cov"
          if [[ ! -x "$LLVM_COV" ]]; then
            LLVM_COV="$(command -v llvm-cov)"
          fi
          [[ -x "$LLVM_COV" ]] || { echo "No usable llvm-cov next to swift or on PATH"; exit 1; }

          PROF="$(find "$PWD/.build" -path '**/codecov/default.profdata' | head -n 1)"
          BIN="$(find "$PWD/.build" -type f -name SocialWireAPIPackageTests ! -path '*dSYM/*' -executable | head -n 1)"
          test -n "$PROF"
          test -n "$BIN"
          "$LLVM_COV" export -format=lcov -instr-profile="$PROF" "$BIN" > coverage.lcov

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: services/api/coverage.lcov
          flags: api
          token: ${{ secrets.CODECOV_TOKEN }}

  # Swift API CI restored — see `services/api/README.md`

  # ── iOS build (stub — wired via Xcode Cloud in Phase 1b) ──────────────────
  # Uncomment when using a macOS runner:
  # build-apple:
  #   name: Build Apple
  #   runs-on: macos-15
  #   steps:
  #     - uses: actions/checkout@v4
  #     - run: xcodebuild -project apps/apple/SocialWire.xcodeproj -scheme SocialWire -destination 'platform=iOS Simulator,name=iPhone 16' build
