name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      gateway: ${{ steps.filter.outputs.gateway }}
      appview: ${{ steps.filter.outputs.appview }}
      appview-worker: ${{ steps.filter.outputs.appview-worker }}
      supabase: ${{ steps.filter.outputs.supabase }}
      lexicons: ${{ steps.filter.outputs.lexicons }}
      spec: ${{ steps.filter.outputs.spec }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/**'
              - 'package.json'
              - 'bun.lock'
              - 'turbo.json'
              - '.github/workflows/ci.yml'
            gateway:
              - 'services/gateway/**'
              - 'packages/swift/GatewayCore/**'
              - 'packages/swift/ThinAppViewCore/**'
              - 'scripts/fly-deploy-gateway.sh'
              - '.github/workflows/ci.yml'
            appview:
              - 'services/appview/**'
              - 'packages/swift/GatewayCore/**'
              - 'packages/swift/ThinAppViewCore/**'
              - 'supabase/**'
              - 'scripts/fly-deploy-appview.sh'
              - '.github/workflows/ci.yml'
            appview-worker:
              - 'services/appview-worker/**'
              - 'packages/swift/ThinAppViewCore/**'
              - 'supabase/**'
              - 'scripts/fly-deploy-appview-worker.sh'
              - '.github/workflows/ci.yml'
            supabase:
              - 'supabase/**'
              - 'scripts/supabase-ci-push.sh'
              - '.github/workflows/ci.yml'
            lexicons:
              - 'packages/lexicons/**'
              - '.github/workflows/ci.yml'
            spec:
              - 'packages/spec/**'
              - 'services/gateway/Sources/Gateway/**'
              - 'services/appview/Sources/AppView/**'
              - 'packages/swift/GatewayCore/**'
              - '.github/workflows/ci.yml'

  build-web:
    name: Build & Test Web
    needs: changes
    if: needs.changes.result == 'success' && needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Typecheck
        run: bunx turbo typecheck --filter=web

      - name: Lint
        run: bunx turbo lint --filter=web

      - name: Test
        run: bunx turbo test --filter=web
        env:
          NEXT_PUBLIC_APP_ENV: test

      - name: Build
        run: bunx turbo build --filter=web
        env:
          NEXT_PUBLIC_APP_ENV: test
          NEXT_PUBLIC_ATPROTO_CLIENT_ID: test-client

  test-gateway:
    name: Swift Gateway (Package)
    needs: changes
    if: needs.changes.result == 'success' && needs.changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache Swift PM build artifacts (GatewayCore)
        uses: actions/cache@v5
        with:
          path: packages/swift/GatewayCore/.build
          key: ${{ runner.os }}-swift-gatewaycore-swift-6.2.4-${{ hashFiles('packages/swift/GatewayCore/Package.resolved', 'packages/swift/ThinAppViewCore/Package.resolved') }}

      - name: Cache Swift PM build artifacts (Gateway)
        uses: actions/cache@v5
        with:
          path: services/gateway/.build
          key: ${{ runner.os }}-swift-gateway-swift-6.2.4-${{ hashFiles('services/gateway/Package.resolved', 'packages/swift/GatewayCore/Package.resolved') }}

      - uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.2.4"
          skip-verify-signature: true

      - name: Test GatewayCore
        working-directory: packages/swift/GatewayCore
        run: swift test

      - name: Test Gateway
        working-directory: services/gateway
        run: swift test

  test-appview:
    name: Swift AppView (Package)
    needs: changes
    if: needs.changes.result == 'success' && needs.changes.outputs.appview == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache Swift PM build artifacts (AppView)
        uses: actions/cache@v5
        with:
          path: services/appview/.build
          key: ${{ runner.os }}-swift-appview-swift-6.2.4-${{ hashFiles('services/appview/Package.resolved', 'packages/swift/GatewayCore/Package.resolved', 'packages/swift/ThinAppViewCore/Package.resolved') }}

      - uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.2.4"
          skip-verify-signature: true

      - name: Test AppView
        working-directory: services/appview
        run: swift test

  test-appview-worker:
    name: Swift AppView Worker (Package)
    needs: changes
    if: needs.changes.result == 'success' && needs.changes.outputs.appview-worker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache Swift PM build artifacts (AppViewWorker)
        uses: actions/cache@v5
        with:
          path: services/appview-worker/.build
          key: ${{ runner.os }}-swift-appview-worker-swift-6.2.4-${{ hashFiles('services/appview-worker/Package.resolved', 'packages/swift/ThinAppViewCore/Package.resolved') }}

      - uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.2.4"
          skip-verify-signature: true

      - name: Test AppViewWorker
        working-directory: services/appview-worker
        run: swift test

  test-lexicons:
    name: Lexicons (Package)
    needs: changes
    if: needs.changes.result == 'success' && needs.changes.outputs.lexicons == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/lexicons
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Test
        run: bun test

  test-spec:
    name: OpenAPI spec (Package)
    needs: changes
    if: needs.changes.result == 'success' && needs.changes.outputs.spec == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/spec
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Test
        run: bun test

  supabase-validate:
    name: Supabase — validate migrations
    needs: changes
    if: needs.changes.result == 'success' && needs.changes.outputs.supabase == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v2
        with:
          version: 2.100.1

      - name: Start local Postgres & apply migrations
        run: |
          set -euo pipefail
          supabase db start --yes
          supabase db reset --local --yes --no-seed

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup --yes || true

  supabase-push-dev:
    name: Supabase — push migrations (dev)
    needs: [changes, supabase-validate]
    if: |
      needs.changes.result == 'success' &&
      needs.changes.outputs.supabase == 'true' &&
      needs.supabase-validate.result == 'success' &&
      github.event_name == 'push' &&
      github.ref_name == 'dev'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v2
        with:
          version: 2.100.1

      - name: Link & db push (dev Supabase project)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          REF: ${{ secrets.SUPABASE_DEV_PROJECT_REF }}
          DATABASE_URL: ${{ secrets.SUPABASE_DEV_DATABASE_URL }}
          DB_PASSWORD: ${{ secrets.SUPABASE_DEV_DB_PASSWORD }}
        run: bash scripts/supabase-ci-push.sh dev

  supabase-push-prod:
    name: Supabase — push migrations (prod)
    needs: [changes, supabase-validate]
    if: |
      needs.changes.result == 'success' &&
      needs.changes.outputs.supabase == 'true' &&
      needs.supabase-validate.result == 'success' &&
      github.event_name == 'push' &&
      github.ref_name == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v2
        with:
          version: 2.100.1

      - name: Link & db push (production Supabase project)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          REF: ${{ secrets.SUPABASE_PROD_PROJECT_REF }}
          DATABASE_URL: ${{ secrets.SUPABASE_PROD_DATABASE_URL }}
          DB_PASSWORD: ${{ secrets.SUPABASE_PROD_DB_PASSWORD }}
        run: bash scripts/supabase-ci-push.sh prod

  ci:
    name: CI — required
    needs:
      - changes
      - build-web
      - test-gateway
      - test-appview
      - test-appview-worker
      - test-lexicons
      - test-spec
      - supabase-validate
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify path-filtered checks
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          WEB_FLAG: ${{ needs.changes.outputs.web }}
          GATEWAY_FLAG: ${{ needs.changes.outputs.gateway }}
          APPVIEW_FLAG: ${{ needs.changes.outputs.appview }}
          APPVIEW_WORKER_FLAG: ${{ needs.changes.outputs.appview-worker }}
          SUPABASE_FLAG: ${{ needs.changes.outputs.supabase }}
          LEXICONS_FLAG: ${{ needs.changes.outputs.lexicons }}
          SPEC_FLAG: ${{ needs.changes.outputs.spec }}
          BUILD_WEB_RESULT: ${{ needs.build-web.result }}
          TEST_GATEWAY_RESULT: ${{ needs.test-gateway.result }}
          TEST_APPVIEW_RESULT: ${{ needs.test-appview.result }}
          TEST_APPVIEW_WORKER_RESULT: ${{ needs.test-appview-worker.result }}
          TEST_LEXICONS_RESULT: ${{ needs.test-lexicons.result }}
          TEST_SPEC_RESULT: ${{ needs.test-spec.result }}
          SUPABASE_VALIDATE_RESULT: ${{ needs.supabase-validate.result }}
        run: |
          set -euo pipefail

          fail() {
            echo "::error::$1"
            exit 1
          }

          if [[ "$CHANGES_RESULT" != "success" ]]; then
            fail "Path detection failed ($CHANGES_RESULT)"
          fi

          check() {
            local flag="$1"
            local result="$2"
            local name="$3"

            if [[ "$flag" == "true" ]]; then
              if [[ "$result" != "success" ]]; then
                fail "$name must pass when its paths change (got $result)"
              fi
            elif [[ "$result" != "success" && "$result" != "skipped" ]]; then
              fail "$name ended with $result"
            fi
          }

          check "$WEB_FLAG" "$BUILD_WEB_RESULT" "Build & Test Web"
          check "$GATEWAY_FLAG" "$TEST_GATEWAY_RESULT" "Swift Gateway (Package)"
          check "$APPVIEW_FLAG" "$TEST_APPVIEW_RESULT" "Swift AppView (Package)"
          check "$APPVIEW_WORKER_FLAG" "$TEST_APPVIEW_WORKER_RESULT" "Swift AppView Worker (Package)"
          check "$LEXICONS_FLAG" "$TEST_LEXICONS_RESULT" "Lexicons (Package)"
          check "$SPEC_FLAG" "$TEST_SPEC_RESULT" "OpenAPI spec (Package)"
          check "$SUPABASE_FLAG" "$SUPABASE_VALIDATE_RESULT" "Supabase — validate migrations"

  deploy-gateway:
    name: Deploy Gateway (Fly.io)
    needs: [changes, ci, test-gateway, test-spec, supabase-validate, supabase-push-dev, supabase-push-prod]
    if: |
      always() &&
      github.event_name == 'push' &&
      (github.ref_name == 'main' || github.ref_name == 'dev') &&
      needs.changes.result == 'success' &&
      needs.changes.outputs.gateway == 'true' &&
      needs.ci.result == 'success' &&
      needs.test-gateway.result != 'failure' &&
      needs.test-gateway.result != 'cancelled' &&
      needs.test-spec.result != 'failure' &&
      needs.test-spec.result != 'cancelled' &&
      needs.supabase-validate.result != 'failure' &&
      needs.supabase-validate.result != 'cancelled' &&
      needs.supabase-push-dev.result != 'failure' &&
      needs.supabase-push-dev.result != 'cancelled' &&
      needs.supabase-push-prod.result != 'failure' &&
      needs.supabase-push-prod.result != 'cancelled' &&
      (needs.test-gateway.result == 'success' || needs.test-gateway.result == 'skipped') &&
      (needs.test-spec.result == 'success' || needs.test-spec.result == 'skipped') &&
      (needs.supabase-validate.result == 'success' || needs.supabase-validate.result == 'skipped') &&
      (needs.supabase-push-dev.result == 'success' || needs.supabase-push-dev.result == 'skipped') &&
      (needs.supabase-push-prod.result == 'success' || needs.supabase-push-prod.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy gateway to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_ORG: ${{ secrets.FLY_ORG }}
          FLY_GATEWAY_APP_DEV: ${{ secrets.FLY_GATEWAY_APP_DEV }}
          FLY_GATEWAY_APP_PROD: ${{ secrets.FLY_GATEWAY_APP_PROD }}
        run: bash scripts/fly-deploy-gateway.sh "${{ github.ref_name }}"

  deploy-appview:
    name: Deploy AppView (Fly.io)
    needs: [changes, ci, test-appview, test-spec, supabase-validate, supabase-push-dev, supabase-push-prod]
    if: |
      always() &&
      github.event_name == 'push' &&
      (github.ref_name == 'main' || github.ref_name == 'dev') &&
      needs.changes.result == 'success' &&
      needs.changes.outputs.appview == 'true' &&
      needs.ci.result == 'success' &&
      needs.test-appview.result != 'failure' &&
      needs.test-appview.result != 'cancelled' &&
      needs.test-spec.result != 'failure' &&
      needs.test-spec.result != 'cancelled' &&
      needs.supabase-validate.result != 'failure' &&
      needs.supabase-validate.result != 'cancelled' &&
      needs.supabase-push-dev.result != 'failure' &&
      needs.supabase-push-dev.result != 'cancelled' &&
      needs.supabase-push-prod.result != 'failure' &&
      needs.supabase-push-prod.result != 'cancelled' &&
      (needs.test-appview.result == 'success' || needs.test-appview.result == 'skipped') &&
      (needs.test-spec.result == 'success' || needs.test-spec.result == 'skipped') &&
      (needs.supabase-validate.result == 'success' || needs.supabase-validate.result == 'skipped') &&
      (needs.supabase-push-dev.result == 'success' || needs.supabase-push-dev.result == 'skipped') &&
      (needs.supabase-push-prod.result == 'success' || needs.supabase-push-prod.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy appview to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_ORG: ${{ secrets.FLY_ORG }}
          FLY_APPVIEW_APP_DEV: ${{ secrets.FLY_APPVIEW_APP_DEV }}
          FLY_APPVIEW_APP_PROD: ${{ secrets.FLY_APPVIEW_APP_PROD }}
        run: bash scripts/fly-deploy-appview.sh "${{ github.ref_name }}"

  deploy-appview-worker:
    name: Deploy AppView Worker (Fly.io)
    needs: [changes, ci, test-appview-worker, supabase-validate, supabase-push-dev, supabase-push-prod]
    if: |
      always() &&
      github.event_name == 'push' &&
      (github.ref_name == 'main' || github.ref_name == 'dev') &&
      needs.changes.result == 'success' &&
      needs.changes.outputs.appview-worker == 'true' &&
      needs.ci.result == 'success' &&
      needs.test-appview-worker.result != 'failure' &&
      needs.test-appview-worker.result != 'cancelled' &&
      needs.supabase-validate.result != 'failure' &&
      needs.supabase-validate.result != 'cancelled' &&
      needs.supabase-push-dev.result != 'failure' &&
      needs.supabase-push-dev.result != 'cancelled' &&
      needs.supabase-push-prod.result != 'failure' &&
      needs.supabase-push-prod.result != 'cancelled' &&
      (needs.test-appview-worker.result == 'success' || needs.test-appview-worker.result == 'skipped') &&
      (needs.supabase-validate.result == 'success' || needs.supabase-validate.result == 'skipped') &&
      (needs.supabase-push-dev.result == 'success' || needs.supabase-push-dev.result == 'skipped') &&
      (needs.supabase-push-prod.result == 'success' || needs.supabase-push-prod.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy appview-worker to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_ORG: ${{ secrets.FLY_ORG }}
          FLY_APPVIEW_WORKER_APP_DEV: ${{ secrets.FLY_APPVIEW_WORKER_APP_DEV }}
          FLY_APPVIEW_WORKER_APP_PROD: ${{ secrets.FLY_APPVIEW_WORKER_APP_PROD }}
        run: bash scripts/fly-deploy-appview-worker.sh "${{ github.ref_name }}"
