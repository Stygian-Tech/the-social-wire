name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Avoid redundant runs stacking on rapid pushes; latest run wins.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Path gates — branch protection must allow skipped jobs (or use separate workflows per surface).
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/**'
              - 'package.json'
              - 'bun.lock'
              - 'turbo.json'
              - '.github/workflows/ci.yml'
            api:
              - 'services/api/**'
              - 'packages/spec/openapi.yaml'
              - '.github/workflows/ci.yml'

  # ── Web ───────────────────────────────────────────────────────────────────
  build-web:
    name: Build & Test Web
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          # Match root `packageManager` so CI doesn’t break on a future `latest`.
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Typecheck
        run: bunx turbo typecheck --filter=web

      - name: Lint
        run: bunx turbo lint --filter=web

      - name: Test
        run: bunx turbo test --filter=web
        env:
          NEXT_PUBLIC_APP_ENV: test

      - name: Build
        run: bunx turbo build --filter=web
        env:
          NEXT_PUBLIC_APP_ENV: test
          NEXT_PUBLIC_ATPROTO_CLIENT_ID: test-client

  test-api:
    name: Swift API (Package)
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4

      - name: Cache Swift PM build artifacts
        uses: actions/cache@v4
        with:
          path: services/api/.build
          # Include toolchain pin: reusing .build across Swift minor bumps can corrupt incremental state.
          key: ${{ runner.os }}-swift-api-swift-6.2.4-${{ hashFiles('services/api/Package.resolved') }}

      - uses: swift-actions/setup-swift@v3
        with:
          # Pin a minor line — `latest` has resolved inconsistently with Swiftly and can fail the version check / build.
          swift-version: "6.2.4"
          # Ubuntu images often lack the Swiftly release signing key in gpg; verification then fails (swift-actions/setup-swift#798).
          skip-verify-signature: true

      - name: Test
        run: swift test

  # Swift API CI restored — see `services/api/README.md`

  # ── iOS build (stub — wired via Xcode Cloud in Phase 1b) ──────────────────
  # Uncomment when using a macOS runner:
  # build-apple:
  #   name: Build Apple
  #   runs-on: macos-15
  #   steps:
  #     - uses: actions/checkout@v4
  #     - run: xcodebuild -project apps/apple/SocialWire.xcodeproj -scheme SocialWire -destination 'platform=iOS Simulator,name=iPhone 16' build
