name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
      worker: ${{ steps.filter.outputs.worker }}
      supabase: ${{ steps.filter.outputs.supabase }}
      lexicons: ${{ steps.filter.outputs.lexicons }}
      spec: ${{ steps.filter.outputs.spec }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/**'
              - 'package.json'
              - 'bun.lock'
              - 'turbo.json'
              - '.github/workflows/ci.yml'
            api:
              - 'services/api/**'
              - 'packages/swift/ThinAppViewCore/**'
              - 'packages/spec/openapi.yaml'
              - 'scripts/fly-deploy-api.sh'
              - '.github/workflows/ci.yml'
            worker:
              - 'services/worker/**'
              - 'packages/swift/ThinAppViewCore/**'
              - 'supabase/**'
              - 'scripts/fly-deploy-worker.sh'
              - '.github/workflows/ci.yml'
            supabase:
              - 'supabase/**'
              - 'scripts/supabase-ci-push.sh'
              - '.github/workflows/ci.yml'
            lexicons:
              - 'packages/lexicons/**'
              - '.github/workflows/ci.yml'
            spec:
              - 'packages/spec/**'
              - 'services/api/Sources/App/**'
              - '.github/workflows/ci.yml'

  build-web:
    name: Build & Test Web
    needs: changes
    if: needs.changes.result == 'success' && needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Typecheck
        run: bunx turbo typecheck --filter=web

      - name: Lint
        run: bunx turbo lint --filter=web

      - name: Test
        run: bunx turbo test --filter=web
        env:
          NEXT_PUBLIC_APP_ENV: test

      - name: Build
        run: bunx turbo build --filter=web
        env:
          NEXT_PUBLIC_APP_ENV: test
          NEXT_PUBLIC_ATPROTO_CLIENT_ID: test-client

  test-api:
    name: Swift API (Package)
    needs: changes
    if: needs.changes.result == 'success' && needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v6

      - name: Cache Swift PM build artifacts
        uses: actions/cache@v5
        with:
          path: services/api/.build
          key: ${{ runner.os }}-swift-api-swift-6.2.4-${{ hashFiles('services/api/Package.resolved', 'packages/swift/ThinAppViewCore/Package.resolved') }}

      - uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.2.4"
          skip-verify-signature: true

      - name: Test
        run: swift test

  test-lexicons:
    name: Lexicons (Package)
    needs: changes
    if: needs.changes.result == 'success' && needs.changes.outputs.lexicons == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/lexicons
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Test
        run: bun test

  test-spec:
    name: OpenAPI spec (Package)
    needs: changes
    if: needs.changes.result == 'success' && needs.changes.outputs.spec == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/spec
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Test
        run: bun test

  test-worker:
    name: Swift Worker (Package)
    needs: changes
    if: needs.changes.result == 'success' && needs.changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache Swift PM build artifacts (ThinAppViewCore)
        uses: actions/cache@v5
        with:
          path: packages/swift/ThinAppViewCore/.build
          key: ${{ runner.os }}-swift-core-swift-6.2.4-${{ hashFiles('packages/swift/ThinAppViewCore/Package.resolved') }}

      - name: Cache Swift PM build artifacts (Worker)
        uses: actions/cache@v5
        with:
          path: services/worker/.build
          key: ${{ runner.os }}-swift-worker-swift-6.2.4-${{ hashFiles('services/worker/Package.resolved', 'packages/swift/ThinAppViewCore/Package.resolved') }}

      - uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.2.4"
          skip-verify-signature: true

      - name: Test ThinAppViewCore
        working-directory: packages/swift/ThinAppViewCore
        run: swift test

      - name: Test Worker
        working-directory: services/worker
        run: swift test

      - name: Build Worker
        working-directory: services/worker
        run: swift build

  supabase-validate:
    name: Supabase — validate migrations
    needs: changes
    if: needs.changes.result == 'success' && needs.changes.outputs.supabase == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v2
        with:
          version: 2.100.1

      - name: Start local Postgres & apply migrations
        run: |
          set -euo pipefail
          supabase db start --yes
          supabase db reset --local --yes --no-seed

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup --yes || true

  supabase-push-dev:
    name: Supabase — push migrations (dev)
    needs: [changes, supabase-validate]
    if: |
      needs.changes.result == 'success' &&
      needs.changes.outputs.supabase == 'true' &&
      needs.supabase-validate.result == 'success' &&
      github.event_name == 'push' &&
      github.ref_name == 'dev'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v2
        with:
          version: 2.100.1

      - name: Link & db push (dev Supabase project)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          REF: ${{ secrets.SUPABASE_DEV_PROJECT_REF }}
          DATABASE_URL: ${{ secrets.SUPABASE_DEV_DATABASE_URL }}
          DB_PASSWORD: ${{ secrets.SUPABASE_DEV_DB_PASSWORD }}
        run: bash scripts/supabase-ci-push.sh dev

  supabase-push-prod:
    name: Supabase — push migrations (prod)
    needs: [changes, supabase-validate]
    if: |
      needs.changes.result == 'success' &&
      needs.changes.outputs.supabase == 'true' &&
      needs.supabase-validate.result == 'success' &&
      github.event_name == 'push' &&
      github.ref_name == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v2
        with:
          version: 2.100.1

      - name: Link & db push (production Supabase project)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          REF: ${{ secrets.SUPABASE_PROD_PROJECT_REF }}
          DATABASE_URL: ${{ secrets.SUPABASE_PROD_DATABASE_URL }}
          DB_PASSWORD: ${{ secrets.SUPABASE_PROD_DB_PASSWORD }}
        run: bash scripts/supabase-ci-push.sh prod

  ci:
    name: CI — required
    needs:
      - changes
      - build-web
      - test-api
      - test-lexicons
      - test-spec
      - test-worker
      - supabase-validate
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify path-filtered checks
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          WEB_FLAG: ${{ needs.changes.outputs.web }}
          API_FLAG: ${{ needs.changes.outputs.api }}
          WORKER_FLAG: ${{ needs.changes.outputs.worker }}
          SUPABASE_FLAG: ${{ needs.changes.outputs.supabase }}
          LEXICONS_FLAG: ${{ needs.changes.outputs.lexicons }}
          SPEC_FLAG: ${{ needs.changes.outputs.spec }}
          BUILD_WEB_RESULT: ${{ needs.build-web.result }}
          TEST_API_RESULT: ${{ needs.test-api.result }}
          TEST_LEXICONS_RESULT: ${{ needs.test-lexicons.result }}
          TEST_SPEC_RESULT: ${{ needs.test-spec.result }}
          TEST_WORKER_RESULT: ${{ needs.test-worker.result }}
          SUPABASE_VALIDATE_RESULT: ${{ needs.supabase-validate.result }}
        run: |
          set -euo pipefail

          fail() {
            echo "::error::$1"
            exit 1
          }

          if [[ "$CHANGES_RESULT" != "success" ]]; then
            fail "Path detection failed ($CHANGES_RESULT)"
          fi

          check() {
            local flag="$1"
            local result="$2"
            local name="$3"

            if [[ "$flag" == "true" ]]; then
              if [[ "$result" != "success" ]]; then
                fail "$name must pass when its paths change (got $result)"
              fi
            elif [[ "$result" != "success" && "$result" != "skipped" ]]; then
              fail "$name ended with $result"
            fi
          }

          check "$WEB_FLAG" "$BUILD_WEB_RESULT" "Build & Test Web"
          check "$API_FLAG" "$TEST_API_RESULT" "Swift API (Package)"
          check "$LEXICONS_FLAG" "$TEST_LEXICONS_RESULT" "Lexicons (Package)"
          check "$SPEC_FLAG" "$TEST_SPEC_RESULT" "OpenAPI spec (Package)"
          check "$WORKER_FLAG" "$TEST_WORKER_RESULT" "Swift Worker (Package)"
          check "$SUPABASE_FLAG" "$SUPABASE_VALIDATE_RESULT" "Supabase — validate migrations"

  deploy-api:
    name: Deploy API (Fly.io)
    needs: [changes, ci, test-api, test-spec, supabase-validate, supabase-push-dev, supabase-push-prod]
    if: |
      always() &&
      github.event_name == 'push' &&
      (github.ref_name == 'main' || github.ref_name == 'dev') &&
      needs.changes.result == 'success' &&
      needs.changes.outputs.api == 'true' &&
      needs.ci.result == 'success' &&
      needs.test-api.result != 'failure' &&
      needs.test-api.result != 'cancelled' &&
      needs.test-spec.result != 'failure' &&
      needs.test-spec.result != 'cancelled' &&
      needs.supabase-validate.result != 'failure' &&
      needs.supabase-validate.result != 'cancelled' &&
      needs.supabase-push-dev.result != 'failure' &&
      needs.supabase-push-dev.result != 'cancelled' &&
      needs.supabase-push-prod.result != 'failure' &&
      needs.supabase-push-prod.result != 'cancelled' &&
      (needs.test-api.result == 'success' || needs.test-api.result == 'skipped') &&
      (needs.test-spec.result == 'success' || needs.test-spec.result == 'skipped') &&
      (needs.supabase-validate.result == 'success' || needs.supabase-validate.result == 'skipped') &&
      (needs.supabase-push-dev.result == 'success' || needs.supabase-push-dev.result == 'skipped') &&
      (needs.supabase-push-prod.result == 'success' || needs.supabase-push-prod.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP_DEV: ${{ secrets.FLY_APP_DEV }}
          FLY_APP_PROD: ${{ secrets.FLY_APP_PROD }}
        run: bash scripts/fly-deploy-api.sh "${{ github.ref_name }}"

  deploy-worker:
    name: Deploy AppView Worker (Fly.io)
    needs: [changes, ci, test-worker, supabase-validate, supabase-push-dev, supabase-push-prod]
    if: |
      always() &&
      github.event_name == 'push' &&
      (github.ref_name == 'main' || github.ref_name == 'dev') &&
      needs.changes.result == 'success' &&
      needs.changes.outputs.worker == 'true' &&
      needs.ci.result == 'success' &&
      needs.test-worker.result != 'failure' &&
      needs.test-worker.result != 'cancelled' &&
      needs.supabase-validate.result != 'failure' &&
      needs.supabase-validate.result != 'cancelled' &&
      needs.supabase-push-dev.result != 'failure' &&
      needs.supabase-push-dev.result != 'cancelled' &&
      needs.supabase-push-prod.result != 'failure' &&
      needs.supabase-push-prod.result != 'cancelled' &&
      (needs.test-worker.result == 'success' || needs.test-worker.result == 'skipped') &&
      (needs.supabase-validate.result == 'success' || needs.supabase-validate.result == 'skipped') &&
      (needs.supabase-push-dev.result == 'success' || needs.supabase-push-dev.result == 'skipped') &&
      (needs.supabase-push-prod.result == 'success' || needs.supabase-push-prod.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy worker to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_WORKER_APP_DEV: ${{ secrets.FLY_WORKER_APP_DEV }}
          FLY_WORKER_APP_PROD: ${{ secrets.FLY_WORKER_APP_PROD }}
        run: bash scripts/fly-deploy-worker.sh "${{ github.ref_name }}"
