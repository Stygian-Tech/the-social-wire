name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # ── Web ───────────────────────────────────────────────────────────────────
  build-web:
    name: Build & Test Web
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Typecheck
        run: bunx turbo typecheck --filter=web

      - name: Lint
        run: bunx turbo lint --filter=web

      - name: Test with coverage
        run: bunx turbo test --filter=web
        env:
          NEXT_PUBLIC_APP_ENV: test

      - name: Build
        run: bunx turbo build --filter=web
        env:
          NEXT_PUBLIC_APP_ENV: test
          NEXT_PUBLIC_ATPROTO_CLIENT_ID: test-client

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: apps/web/coverage/lcov.info
          flags: web
          token: ${{ secrets.CODECOV_TOKEN }}

  test-api:
    name: Swift API (Package)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4

      - name: Cache Swift PM build artifacts
        uses: actions/cache@v4
        with:
          path: services/api/.build
          key: ${{ runner.os }}-swift-api-swift62-${{ hashFiles('services/api/Package.resolved') }}

      - uses: swift-actions/setup-swift@v3
        with:
          # Swiftly-managed toolchain (swift-actions/setup-swift v3); pin ≥ 6.2 for transitive packages (e.g. swift-log 1.12+).
          swift-version: "latest"

      - name: Build
        run: swift build

      - name: Test with coverage
        run: swift test --enable-code-coverage

      - name: Export lcov from llvm-cov
        run: |
          set -euo pipefail
          PROF="$(find "$PWD/.build" -path '**/codecov/default.profdata' | head -n 1)"
          BIN="$(find "$PWD/.build" -type f -perm -111 -name SocialWireAPIPackageTests | grep -v dSYM | head -n 1)"
          test -n "$PROF"
          test -n "$BIN"
          llvm-cov export -format=lcov -instr-profile="$PROF" "$BIN" > coverage.lcov

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: services/api/coverage.lcov
          flags: api
          token: ${{ secrets.CODECOV_TOKEN }}

  # Swift API CI restored — see `services/api/README.md`

  # ── iOS build (stub — wired via Xcode Cloud in Phase 1b) ──────────────────
