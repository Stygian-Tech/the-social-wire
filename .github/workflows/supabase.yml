name: Supabase

# Migrations + local validation only when Supabase assets change (or this workflow edits).
on:
  pull_request:
    branches: [main, dev]
    paths:
      - 'supabase/**'
      - '.github/workflows/supabase.yml'
  push:
    branches: [main, dev]
    paths:
      - 'supabase/**'
      - '.github/workflows/supabase.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: supabase-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-migrations:
    name: Validate migrations (local Postgres)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Start local Postgres & apply migrations
        run: |
          set -euo pipefail
          supabase db start --yes
          supabase db reset --local --yes --no-seed

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup --yes || true

  push-migrations-dev:
    name: Push migrations (dev)
    if: github.event_name == 'push' && github.ref_name == 'dev'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DEV_PROJECT_REF: ${{ secrets.SUPABASE_DEV_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Link & db push
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DEV_DB_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo '::error::Missing repository secret SUPABASE_ACCESS_TOKEN.'
            exit 1
          fi
          if [ -z "${SUPABASE_DEV_PROJECT_REF:-}" ]; then
            echo '::error::Missing repository secret SUPABASE_DEV_PROJECT_REF.'
            exit 1
          fi
          if [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then
            echo '::error::Missing repository secret SUPABASE_DEV_DB_PASSWORD.'
            exit 1
          fi
          # Default link uses the pooler (IPv4-friendly). GitHub-hosted runners often cannot reach Supabase direct DB IPv6.
          supabase link --project-ref "${SUPABASE_DEV_PROJECT_REF}" --yes
          supabase db push --yes

  push-migrations-prod:
    name: Push migrations (production)
    if: github.event_name == 'push' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROD_PROJECT_REF: ${{ secrets.SUPABASE_PROD_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Link & db push
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PROD_DB_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo '::error::Missing repository secret SUPABASE_ACCESS_TOKEN.'
            exit 1
          fi
          if [ -z "${SUPABASE_PROD_PROJECT_REF:-}" ]; then
            echo '::error::Missing repository secret SUPABASE_PROD_PROJECT_REF.'
            exit 1
          fi
          if [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then
            echo '::error::Missing repository secret SUPABASE_PROD_DB_PASSWORD.'
            exit 1
          fi
          supabase link --project-ref "${SUPABASE_PROD_PROJECT_REF}" --yes
          supabase db push --yes
