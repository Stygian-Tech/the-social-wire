name: Supabase

# Migrations + local validation only when Supabase assets change (or this workflow edits).
on:
  pull_request:
    branches: [main, dev]
    paths:
      - 'supabase/**'
      - '.github/workflows/supabase.yml'
      - 'scripts/supabase-ci-push.sh'
  push:
    branches: [main, dev]
    paths:
      - 'supabase/**'
      - '.github/workflows/supabase.yml'
      - 'scripts/supabase-ci-push.sh'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: supabase-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-migrations:
    name: Validate migrations (local Postgres)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v2
        with:
          # Pin: `version: latest` has resolved to a broken install string on some runners (shows as "v)").
          version: 2.100.1

      - name: Start local Postgres & apply migrations
        run: |
          set -euo pipefail
          supabase db start --yes
          supabase db reset --local --yes --no-seed

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup --yes || true

  push-migrations-dev:
    name: Push migrations (dev)
    if: github.event_name == 'push' && github.ref_name == 'dev'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v2
        with:
          version: 2.100.1

      - name: Link & db push (dev Supabase project)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          REF: ${{ secrets.SUPABASE_DEV_PROJECT_REF }}
          DATABASE_URL: ${{ secrets.SUPABASE_DEV_DATABASE_URL }}
          DB_PASSWORD: ${{ secrets.SUPABASE_DEV_DB_PASSWORD }}
        run: bash scripts/supabase-ci-push.sh dev

  push-migrations-prod:
    name: Push migrations (production)
    if: github.event_name == 'push' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v2
        with:
          version: 2.100.1

      - name: Link & db push (production Supabase project)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          REF: ${{ secrets.SUPABASE_PROD_PROJECT_REF }}
          DATABASE_URL: ${{ secrets.SUPABASE_PROD_DATABASE_URL }}
          DB_PASSWORD: ${{ secrets.SUPABASE_PROD_DB_PASSWORD }}
        run: bash scripts/supabase-ci-push.sh prod
