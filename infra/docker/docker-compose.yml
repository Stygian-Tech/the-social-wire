services:
  api:
    image: docker.io/stygiantech/social-wire-api:${IMAGE_TAG:-dev}
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - PORT=8080
    volumes:
      - sqlite_data:/data/sqlite   # persists SQLite DB across container restarts (APP_ENV=local)
    restart: unless-stopped
    depends_on:
      caddy:
        condition: service_started

  portainer:
    image: portainer/portainer-ce:latest
    ports:
      - "9000:9000"   # HTTP UI
      - "9443:9443"   # HTTPS UI
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    restart: unless-stopped

  caddy:
    image: caddy:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  portainer_data:
  caddy_data:
  caddy_config:
  sqlite_data:     # SQLite database for APP_ENV=local
