name: SocialWire
options:
  minimumXcodeGenVersion: 2.43.0
  defaultSourceDirectoryType: syncedFolder
  deploymentTarget:
    iOS: "17.0"
configs:
  Debug: debug
  Beta: release
  Release: release
settings:
  base:
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: G39TU2R26A
    CODE_SIGN_STYLE: Automatic
targets:
  SocialWire:
    type: application
    platform: iOS
    sources:
      - path: SocialWire
    info:
      path: SocialWire/Info.plist
      properties:
        CFBundleDisplayName: The Social Wire
        CFBundleURLTypes:
          - CFBundleURLName: com.samclemente.the-social-wire.oauth
            CFBundleURLSchemes:
              - app.thesocialwire
              - app.thesocialwire.api
              - app.thesocialwire.testing.api
        LSRequiresIPhoneOS: true
        UIApplicationSupportsIndirectInputEvents: true
        UIRequiresFullScreen: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.samclemente.the-social-wire
        PRODUCT_NAME: SocialWire
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: SocialWire/SocialWire.entitlements
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.news
      configs:
        Beta:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited) SOCIALWIRE_TESTING_API
  SocialWireTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SocialWireTests
    dependencies:
      - target: SocialWire
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.samclemente.the-social-wire.tests
        PRODUCT_NAME: SocialWireTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SocialWire.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/SocialWire"
        BUNDLE_LOADER: "$(TEST_HOST)"
      configs:
        Beta:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited) SOCIALWIRE_TESTING_API
schemes:
  SocialWire:
    build:
      targets:
        SocialWire: all
        SocialWireTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SocialWireTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  SocialWire-TestFlight:
    build:
      targets:
        SocialWire: all
        SocialWireTests: [test]
    run:
      config: Beta
    test:
      config: Beta
      targets:
        - SocialWireTests
    profile:
      config: Beta
    analyze:
      config: Beta
    archive:
      config: Beta
