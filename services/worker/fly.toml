# Thin AppView ingestion worker (dev).
#
# Deploy from this directory (uses monorepo root as Docker build context):
#   fly deploy ../.. --config services/worker/fly.toml --app the-social-wire-dev-worker
# Or: bash deploy.sh dev

app = 'the-social-wire-dev-worker'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  wait_timeout = '10m0s'

[env]
  ENABLE_THIN_APPVIEW = 'true'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
