# fly.toml app configuration file generated for social-wire-api on 2026-05-18T01:27:43Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'the-social-wire-dev'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  wait_timeout = '10m0s'

[env]
  PORT = '8080'
  # `/ios-client-metadata.json` derives `redirect_uris` from the request Host (`client_id` origin), reversed —
  # no separate redirect override. `OAUTH_PUBLIC_ORIGIN` applies only to `/oauth/client-metadata.json`.

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '1m0s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
