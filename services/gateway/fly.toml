# Deploy: fly deploy ../.. --config services/gateway/fly.toml --app the-social-wire-dev-gateway

app = 'the-social-wire-dev-gateway'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  wait_timeout = '10m0s'

[env]
  PORT = '8080'
  # Optional: proxy sidebar reads to AppView during cutover
  # APPVIEW_BASE_URL = 'https://appview-dev.thesocialwire.app'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '1m0s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
