# Deploy from repo root: bash services/gateway/deploy.sh dev
# Or: fly deploy ../.. --config services/gateway/fly.toml --app the-social-wire-dev-gateway

app = 'the-social-wire-dev-gateway'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'
  context = '../..'

[deploy]
  wait_timeout = '10m0s'

[env]
  PORT = '8080'
  # Required for AppView proxy + DPoP structural OAuth fallback (same value on gateway + appview):
  # fly secrets set GATEWAY_APPVIEW_INTERNAL_SECRET="$(openssl rand -hex 32)" --app the-social-wire-dev-gateway
  # fly secrets set GATEWAY_APPVIEW_INTERNAL_SECRET="<same>" --app the-social-wire-dev-appview
  # APPVIEW_BASE_URL = 'https://the-social-wire-dev-appview.fly.dev'
  # OAUTH_GATEWAY_REQUIRE_KNOWN_CLIENT = 'true'
  # OAUTH_GATEWAY_ALLOWED_CLIENT_IDS = 'https://api.testing.thesocialwire.app/oauth/client-metadata.json'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '1m0s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
