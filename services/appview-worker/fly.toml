# Deploy from repo root: bash services/appview-worker/deploy.sh dev
# Or: fly deploy ../.. --config services/appview-worker/fly.toml --app the-social-wire-dev-appview-worker

app = 'the-social-wire-dev-appview-worker'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'
  context = '../..'

[env]
  ENABLE_THIN_APPVIEW = 'true'
  # Per-app secret (same pooler URI as gateway/appview):
  # fly secrets set SUPABASE_DATABASE_URL='postgresql://postgres.[ref]:...' APP_ENV=dev --app the-social-wire-dev-appview-worker

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
