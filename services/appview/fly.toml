# Deploy from repo root: bash services/appview/deploy.sh dev
# Or: fly deploy ../.. --config services/appview/fly.toml --app the-social-wire-dev-appview
#
# Listens on APPVIEW_PORT (8081). Do not set a Fly secret PORT=8080 — it overrides fly.toml and breaks health checks.

app = 'the-social-wire-dev-appview'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'
  context = '../..'

[deploy]
  wait_timeout = '10m0s'

[env]
  APPVIEW_PORT = '8081'
  PORT = '8081'
  ENABLE_THIN_APPVIEW = 'true'
  # Must match gateway: fly secrets set GATEWAY_APPVIEW_INTERNAL_SECRET="<same>" --app the-social-wire-dev-appview
  # SUPABASE_DATABASE_URL = 'postgres://...'

[http_service]
  internal_port = 8081
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '1m0s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
